name: Bug Report
description: File a bug report to help us improve WinHome
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run WinHome with config ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: e.g. Windows 11 22H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Config
      description: Please paste any relevant WinHome logs or your `config.yaml` (redact secrets!).
      render: yaml
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the problem here.
