version: "1.0"
apps:
  - id: 7zip
    manager: scoop
  - id: git
    manager: scoop
  - id: wget
    manager: choco
  - id: "tpope/vim-fugitive"
    manager: "vim"
  - id: "esbenp.prettier-vscode"
    manager: "vscode"
  - id: "vscode"
    manager: "choco"
envVars:
  - variable: "WINHOME_TEST"
    value: "true"
    action: "set"
dotfiles:
  - src: "README.md"
    target: "test-dotfile.md"
registryTweaks:
  - path: 'HKCU\Software\WinHomeTest'
    name: "TestValue"
    value: 123
    type: "dword"
systemSettings:
  show_file_extensions: true
git:
  userName: "WinHome Test"
  userEmail: "test@winhome.local"
  settings:
    init.defaultBranch: main
extensions:
  # --- Core / CLI Tools & Package Managers ---
  chocolatey:
    settings:
      useFinishedEvent: true
  scoop:
    settings:
      aria2-enabled: true
  winget:
    settings:
      visual:
        progressBar: rainbow
      installBehavior:
        preferences:
          scope: user
  cargo:
    settings:
      build:
        jobs: 4
      net:
        retry: 2
  pip:
    settings:
      global:
        index-url: "https://pypi.org/simple"
  npm:
    settings:
      "save-exact": true
  pnpm:
    settings:
      "store-dir": "C:\\pnpm-store"
  yarn:
    settings:
      nodeLinker: "node-modules"
  nuget:
    settings:
      config:
        dependencyVersion: "Highest"
  go:
    settings:
      GO111MODULE: "on"
  deno:
    settings:
      v8-flags: ["--max-old-space-size=4096"]
  nvm:
    settings:
      root: "C:\\nvm"
  sdkman:
    settings:
      sdkman_auto_selfupdate: "false"
  mise:
    settings:
      experimental: true
  rustup:
    settings:
      default_toolchain: "stable"
  topgrade:
    settings:
      misc:
        assume_yes: true

  # --- Editors & IDEs ---
  vim:
    settings:
      number: true
      relativenumber: true
      mouse: "a"
      tabstop: 4
  vscode:
    settings:
      "editor.formatOnSave": true
      "workbench.colorTheme": "Default Dark Modern"
      "telemetry.enableTelemetry": false
    extensions:
      - "esbenp.prettier-vscode"
      - "dbaeumer.vscode-eslint"
  helix-editor:
    settings:
      editor:
        cursor-shape:
          insert: "bar"
  sublime-text:
    settings:
      font_size: 12
  zed:
    settings:
      theme: "One Dark"
      font_size: 16
      vim_mode: true
  notepadplusplus:
    settings:
      AppPath: "C:\\Program Files\\Notepad++"
  opencode:
    settings:
      terminal:
        integrated:
          fontSize: 14
    projectRoot: "C:\\projects"

  # --- Shells & Terminals ---
  powershell:
    aliases:
      g: "git"
    modules:
      Terminal-Icons: {}
  windows-terminal:
    settings:
      profiles:
        defaults:
          font:
            face: "Fira Code"
  starship:
    settings:
      character:
        success_symbol: "[➜](bold green)"
      add_newline: false
  ohmyposh:
    profile: "C:\\Users\\test\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1"
    settings:
      theme: "bubbles"
  zoxide:
    init:
      cmd: "j"
  fzf:
    settings:
      FZF_DEFAULT_OPTS: "--reverse --height 40%"
      border: "rounded"
  yazi:
    manager:
      sort_by: "mtime"
      sort_reverse: true
  ripgrep:
    settings:
      "max-columns": 150
      "smart-case": true
  openssh:
    settings:
      ForwardAgent: "yes"
    hosts:
      lab:
        HostName: "192.168.1.10"
        User: "admin"

  # --- System & Windows Settings ---
  windows-explorer:
    settings:
      HideFileExt: true
  windows-sandbox:
    settings:
      VGpu: "Disable"
  autohotkey:
    script_path: "%USERPROFILE%\\Documents\\AutoHotkey\\main.ahk"
    settings:
      persistent: true
    hotkeys:
      "#n": 'Run "notepad.exe"'
  powertoys:
    settings:
      FancyZones:
        enabled: true
      PowerRename:
        enabled: true
  7-zip:
    settings:
      CompressionLevel: 9
      CompressionMethod: "LZMA2"
  greenshot:
    settings:
      Core:
        Language: "en-US"

  # --- Development Tools & Utilities ---
  git:
    userName: "WinHome Test"
    userEmail: "test@winhome.local"
    settings:
      init.defaultBranch: main
  github-desktop:
    settings:
      theme: "dark"
  gh:
    settings:
      aliases:
        co: "pr checkout"
      editor: "nvim"
  gh-dash:
    settings:
      prs:
        filters: "is:open author:@me"
  docker:
    settings:
      skipTermOfServiceCheck: true
      displayDeviceSharingNotifications: false
  lazygit:
    settings:
      gui:
        theme:
          lightTheme: false
  lazydocker:
    settings:
      gui:
        showBottomLine: false
  chezmoi:
    settings:
      data:
        email: "test@example.com"
  rclone:
    settings:
      stats: "10s"
    remotes:
      mydrive:
        type: "drive"
        scope: "drive.readonly"
  curl:
    settings:
      "--connect-timeout": "10"
      "--user-agent": "Mozilla/5.0"
  wget:
    settings:
      "--timeout": "30"
  postman:
    settings:
      telemetry: false

  # --- Productivity & General Apps ---
  obsidian:
    vaults:
      - path: "C:\\Users\\test\\Documents\\Vault"
        settings:
          vimMode: true
          spellcheck: true
        plugins:
          - "obsidian-git"
  joplin:
    settings:
      theme: 2
  keepassxc:
    settings:
      GUI:
        ShowTrayIcon: true
  syncthing:
    settings:
      gui:
        theme: "black"
  everything:
    settings:
      run_as_admin: true
  flow-launcher:
    settings:
      Theme: "Dark"
  discord:
    settings:
      openOnStartup: false
  betterdiscord:
    settings:
      theme: "DarkerDiscord"
      plugins:
        BetterFormatting: true
  ditto:
    settings:
      MaxSavedCopies: 500
  espanso:
    matches:
      - trigger: ":br"
        replace: "Best regards,"
  rainmeter:
    settings:
      Rainmeter:
        ConfigEditor: "notepad.exe"
  wallpaper-engine:
    settings:
      General:
        uiTheme: "dark"
  yasb:
    settings:
      bar:
        blur: true

  # --- Multimedia ---
  vlc:
    settings:
      qt:
        qt-max-volume: 125
  spotify:
    settings:
      app:
        audio:
          quality: "high"
  obs-studio:
    general:
      theme: "Acri"
  audacity:
    settings:
      Interface:
        Language: "en"
  irfanview:
    settings:
      Language: "English"

  # --- Testing & Custom Plugins ---
  test-powershell:
    message: "Testing PowerShell Plugin"
